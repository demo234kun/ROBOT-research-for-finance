<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#11182f"/>
    </linearGradient>
    <linearGradient id="frontend" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="supabase" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="external" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="800" height="520" rx="12" fill="url(#bg)"/>

  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#e2e8f0">机器人产业投研平台 · 系统架构</text>

  <!-- 前端 -->
  <rect x="40" y="70" width="240" height="380" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="160" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#60a5fa">前端 React + Vite + TS</text>

  <rect x="70" y="120" width="180" height="40" rx="8" fill="url(#frontend)" filter="url(#shadow)"/>
  <text x="160" y="146" text-anchor="middle" font-size="12" fill="#fff">产业链图谱</text>

  <rect x="70" y="175" width="180" height="40" rx="8" fill="url(#frontend)" filter="url(#shadow)"/>
  <text x="160" y="201" text-anchor="middle" font-size="12" fill="#fff">实时监控</text>

  <rect x="70" y="230" width="180" height="40" rx="8" fill="url(#frontend)" filter="url(#shadow)"/>
  <text x="160" y="256" text-anchor="middle" font-size="12" fill="#fff">研报中心</text>

  <rect x="70" y="285" width="180" height="40" rx="8" fill="url(#frontend)" filter="url(#shadow)"/>
  <text x="160" y="311" text-anchor="middle" font-size="12" fill="#fff">个股详情面板</text>

  <rect x="70" y="340" width="180" height="40" rx="8" fill="url(#frontend)" filter="url(#shadow)"/>
  <text x="160" y="366" text-anchor="middle" font-size="12" fill="#fff">K线 / 分时 / 指标图</text>

  <!-- 后端 -->
  <rect x="320" y="70" width="240" height="380" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="440" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#34d399">Supabase 后端</text>

  <rect x="350" y="120" width="180" height="36" rx="8" fill="url(#supabase)" filter="url(#shadow)"/>
  <text x="440" y="143" text-anchor="middle" font-size="11" fill="#fff">stock-info</text>

  <rect x="350" y="165" width="180" height="36" rx="8" fill="url(#supabase)" filter="url(#shadow)"/>
  <text x="440" y="188" text-anchor="middle" font-size="11" fill="#fff">stock-kline</text>

  <rect x="350" y="210" width="180" height="36" rx="8" fill="url(#supabase)" filter="url(#shadow)"/>
  <text x="440" y="233" text-anchor="middle" font-size="11" fill="#fff">stock-mink</text>

  <rect x="350" y="255" width="180" height="36" rx="8" fill="url(#supabase)" filter="url(#shadow)"/>
  <text x="440" y="278" text-anchor="middle" font-size="11" fill="#fff">monitor-hotspot</text>

  <rect x="350" y="300" width="180" height="36" rx="8" fill="url(#supabase)" filter="url(#shadow)"/>
  <text x="440" y="323" text-anchor="middle" font-size="11" fill="#fff">Auth / Database</text>

  <rect x="350" y="345" width="180" height="36" rx="8" fill="url(#supabase)" filter="url(#shadow)"/>
  <text x="440" y="368" text-anchor="middle" font-size="11" fill="#fff">Storage</text>

  <rect x="350" y="390" width="180" height="36" rx="8" fill="url(#supabase)" filter="url(#shadow)"/>
  <text x="440" y="413" text-anchor="middle" font-size="11" fill="#fff">RLS / Edge Cache</text>

  <!-- 外部服务 -->
  <rect x="600" y="70" width="160" height="380" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="680" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#fbbf24">外部服务</text>

  <rect x="620" y="120" width="120" height="44" rx="8" fill="url(#external)" filter="url(#shadow)"/>
  <text x="680" y="140" text-anchor="middle" font-size="11" fill="#fff">股票实时行情</text>
  <text x="680" y="156" text-anchor="middle" font-size="10" fill="#fef3c7">K线 / 分时</text>

  <rect x="620" y="180" width="120" height="44" rx="8" fill="url(#external)" filter="url(#shadow)"/>
  <text x="680" y="200" text-anchor="middle" font-size="11" fill="#fff">MiniMax AI</text>
  <text x="680" y="216" text-anchor="middle" font-size="10" fill="#fef3c7">热点分析</text>

  <rect x="620" y="240" width="120" height="44" rx="8" fill="url(#external)" filter="url(#shadow)"/>
  <text x="680" y="260" text-anchor="middle" font-size="11" fill="#fff">AI搜索</text>
  <text x="680" y="276" text-anchor="middle" font-size="10" fill="#fef3c7">实时资讯</text>

  <!-- 连接箭头 -->
  <g stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrowhead)">
    <path d="M250 140 H320"/>
    <path d="M250 195 H320"/>
    <path d="M250 250 H320"/>
    <path d="M250 305 H320"/>
    <path d="M250 360 H320"/>
    <path d="M560 140 H600"/>
    <path d="M560 182 H600"/>
    <path d="M560 262 H600"/>
  </g>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>

  <!-- 图例 -->
  <g transform="translate(40, 470)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="url(#frontend)"/>
    <text x="22" y="12" font-size="11" fill="#94a3b8">前端模块</text>

    <rect x="110" y="0" width="14" height="14" rx="3" fill="url(#supabase)"/>
    <text x="132" y="12" font-size="11" fill="#94a3b8">Supabase Edge Function</text>

    <rect x="310" y="0" width="14" height="14" rx="3" fill="url(#external)"/>
    <text x="332" y="12" font-size="11" fill="#94a3b8">外部数据源 / AI</text>
  </g>
</svg>